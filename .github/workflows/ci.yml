name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'docker/**'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'docker/**'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  PACKAGE_NAME: komari-agent-c
  FEED_NAME: komari_ci

jobs:
  test-binary-build:
    name: Test binary build on linux/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64, arm, armv7, mipsel, mips64, riscv64, 386]

    steps:
      - uses: actions/checkout@v5

      - name: Build binary in Docker
        run: |
          mkdir -p output
          docker compose -f docker/docker-compose.yml run --rm build-${{ matrix.goarch }}

      - name: Verify binary
        run: |
          BINARY="output/komari-agent-c-linux-${{ matrix.goarch }}"
          if [ ! -f "$BINARY" ]; then
            echo "Error: Binary not found at $BINARY"
            exit 1
          fi
          echo "Binary size: $(du -h "$BINARY" | cut -f1)"
          file "$BINARY"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-binary-linux-${{ matrix.goarch }}
          path: output/komari-agent-c-linux-${{ matrix.goarch }}
          retention-days: 7

  test-openwrt-build:
    name: Test build on ${{ matrix.arch }} (${{ matrix.version }})
    needs: test-binary-build
    if: always()
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64_generic
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_cortex-a76
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a9_vfpv3-d16
          - arm_cortex-a15_neon-vfpv4
          - mips_24kc
          - mipsel_24kc
        version:
          - 24.10.6
          - 25.12.2

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc-multilib

      - name: Prepare package
        run: |
          mkdir -p package/${{ env.PACKAGE_NAME }}
          cp -r src package/${{ env.PACKAGE_NAME }}/
          cp -r include package/${{ env.PACKAGE_NAME }}/
          cp -r cmake package/${{ env.PACKAGE_NAME }}/ 2>/dev/null || true
          cp CMakeLists.txt package/${{ env.PACKAGE_NAME }}/
          cp openwrt/Makefile package/${{ env.PACKAGE_NAME }}/Makefile

          # Remove PKG_SOURCE_* lines so OpenWrt build system skips git download and hash check
          # Build/Prepare in openwrt/Makefile copies local source files instead
          sed -i '/^PKG_SOURCE_PROTO:/d; /^PKG_SOURCE_URL:/d; /^PKG_SOURCE_VERSION:/d' package/${{ env.PACKAGE_NAME }}/Makefile

          mkdir -p package/${{ env.PACKAGE_NAME }}/files
          cp openwrt/files/komari-agent-c.config package/${{ env.PACKAGE_NAME }}/files/
          cp openwrt/files/komari-agent-c.init package/${{ env.PACKAGE_NAME }}/files/

      - name: Build
        uses: openwrt/gh-action-sdk@v9
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.version }}
          FEEDNAME: ${{ env.FEED_NAME }}
          PACKAGES: komari-agent-c
          KOMARI_VERBOSE_CMAKE: ON

      - name: Rename packages with arch suffix
        run: |
          cd bin/packages/${{ matrix.arch }}/${{ env.FEED_NAME }}/
          for f in *.ipk; do mv "$f" "${f/.ipk/-${{ matrix.arch }}.ipk}" 2>/dev/null || true; done
          for f in *.apk; do mv "$f" "${f/.apk/-${{ matrix.arch }}.apk}" 2>/dev/null || true; done

      - name: Verify build
        run: |
          echo "Checking for IPK packages..."
          IPK_COUNT=$(find bin/packages/${{ matrix.arch }}/${{ env.FEED_NAME }}/ -name "*.ipk" 2>/dev/null | wc -l)
          echo "Found $IPK_COUNT IPK package(s)"

          echo "Checking for APK packages..."
          APK_COUNT=$(find bin/packages/${{ matrix.arch }}/${{ env.FEED_NAME }}/ -name "*.apk" 2>/dev/null | wc -l)
          echo "Found $APK_COUNT APK package(s)"

          if [ "$IPK_COUNT" -eq 0 ] && [ "$APK_COUNT" -eq 0 ]; then
            echo "Error: Build failed - no package files found!"
            exit 1
          fi

          echo "Build successful for ${{ matrix.arch }} on ${{ matrix.version }}"
          echo ""
          echo "IPK packages:"
          find bin/packages/${{ matrix.arch }}/${{ env.FEED_NAME }}/ -name "*.ipk" -exec ls -lh {} \; 2>/dev/null || echo "  (none)"
          echo ""
          echo "APK packages:"
          find bin/packages/${{ matrix.arch }}/${{ env.FEED_NAME }}/ -name "*.apk" -exec ls -lh {} \; 2>/dev/null || echo "  (none)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-${{ matrix.arch }}-${{ matrix.version }}
          path: bin/packages/${{ matrix.arch }}/${{ env.FEED_NAME }}/*.*pk
          retention-days: 7

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-test-${{ matrix.arch }}-${{ matrix.version }}
          path: logs/
          retention-days: 7

  test-luci-build:
    name: Test LuCI build on (${{ matrix.version }})
    needs: test-binary-build
    if: always()
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - 24.10.6
          - 25.12.2

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc-multilib

      - name: Prepare packages
        run: |
          mkdir -p package/luci-app-komari-agent-c
          cp -r luci/* package/luci-app-komari-agent-c/

          mkdir -p package/${{ env.PACKAGE_NAME }}
          cp -r src package/${{ env.PACKAGE_NAME }}/
          cp -r include package/${{ env.PACKAGE_NAME }}/
          cp -r cmake package/${{ env.PACKAGE_NAME }}/ 2>/dev/null || true
          cp CMakeLists.txt package/${{ env.PACKAGE_NAME }}/
          cp openwrt/Makefile package/${{ env.PACKAGE_NAME }}/Makefile

          sed -i '/^PKG_SOURCE_PROTO:/d; /^PKG_SOURCE_URL:/d; /^PKG_SOURCE_VERSION:/d' package/${{ env.PACKAGE_NAME }}/Makefile

          mkdir -p package/${{ env.PACKAGE_NAME }}/files
          cp openwrt/files/komari-agent-c.config package/${{ env.PACKAGE_NAME }}/files/
          cp openwrt/files/komari-agent-c.init package/${{ env.PACKAGE_NAME }}/files/

      - name: Build
        uses: openwrt/gh-action-sdk@v9
        env:
          ARCH: x86_64-${{ matrix.version }}
          FEEDNAME: ${{ env.FEED_NAME }}
          PACKAGES: luci-app-komari-agent-c
          KOMARI_VERBOSE_CMAKE: ON

      - name: Verify build
        run: |
          echo "Checking for LuCI packages..."
          IPK_COUNT=$(find bin/packages/ -name "luci-app-komari-agent-c*.ipk" 2>/dev/null | wc -l)
          echo "Found $IPK_COUNT IPK package(s)"

          APK_COUNT=$(find bin/packages/ -name "luci-app-komari-agent-c*.apk" 2>/dev/null | wc -l)
          echo "Found $APK_COUNT APK package(s)"

          I18N_COUNT=$(find bin/packages/ -name "luci-i18n-komari-agent-c*.*pk" 2>/dev/null | wc -l)
          echo "Found $I18N_COUNT i18n package(s)"

          if [ "$IPK_COUNT" -eq 0 ] && [ "$APK_COUNT" -eq 0 ]; then
            echo "Error: Build failed - no LuCI package files found!"
            exit 1
          fi

          echo "Build successful for OpenWrt ${{ matrix.version }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-luci-${{ matrix.version }}
          path: |
            bin/packages/*/${{ env.FEED_NAME }}/luci-app-komari-agent-c*.*pk
            bin/packages/*/${{ env.FEED_NAME }}/luci-i18n-komari-agent-c*.*pk
          retention-days: 7

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-luci-test-${{ matrix.version }}
          path: logs/
          retention-days: 7

  lint:
    name: Code quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install lint tools
        run: |
          pip install codespell pyyaml

      - name: Spell check
        run: |
          codespell --skip=".git,*.po,*.ipk,*.apk,*.lmo" --ignore-words-list="ba,dne,nce,nam,ot,tht" || true

      - name: Check shell scripts
        run: |
          find . -name "*.sh" -exec bash -n {} \;

      - name: Check YAML syntax
        run: |
          python -c "
          import yaml
          import sys
          import os
          files = ['.github/workflows/ci.yml', '.github/workflows/release.yml', 'docker/docker-compose.yml']
          for f in files:
              if not os.path.exists(f):
                  print(f'⚠️ {f}: File not found, skipping')
                  continue
              try:
                  with open(f) as fh:
                      yaml.safe_load(fh)
                  print(f'✅ {f}: Valid')
              except yaml.YAMLError as e:
                  print(f'❌ {f}: {e}')
                  sys.exit(1)
          "

      - name: Verify CI config
        run: |
          chmod +x scripts/verify-ci-config.sh
          ./scripts/verify-ci-config.sh

      - name: Run unit tests in Docker
        run: |
          mkdir -p output
          docker compose -f docker/docker-compose.yml run --rm test


